<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ponderada</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.js"></script>
  <script src="data.js"></script>
</head>

<body>
  <select id="parameters" name="parameters">
    <option value="interchange">Interchange</option>
    <option value="taxa_utilizacao_media">Taxa de utilização média do limite</option>
    <option value="loss_given_default">Loss Given Default</option>
    <option value="inadimplencia_fisica_maxima">Inadimplência física máxima permitida</option>
    <option value="inadimplencia_financeira_maxima">Inadimplência financeira máxima permitida</option>
    <option value="limite_maximo_concedivel">Limite máximo concedível</option>
    <option value="multiplicador_maximo_alavancagem">Multiplicador máximo de alavancagem para a faixa de risco</option>
  </select>
</body>

<script>
  let selectedParameter = 'interchange';

  function setup() {
    createCanvas(600, 400);
    fill(0);

    const selectElement = document.getElementById('parameters');
    selectedParameter = selectElement.value;
    selectElement.addEventListener('change', (event) => {
      selectedParameter = event.target.value;
    });
  }

  function draw() {
    background(240);
    translate(0, height);

    let maxX = 0;
    let maxY = 0;

    for (let r of resultados) {
      if (r[selectedParameter] > maxX) maxX = r[selectedParameter];
      if (r.maximo_retorno_obtido > maxY) maxY = r.maximo_retorno_obtido;
    }

    // Add a 10% padding to the max values
    maxX = (maxX * 1.1) || 10;
    maxY = (maxY * 1.1) || 10;

    drawGrid(maxX, maxY);
    drawBars(maxX, maxY);
  }

  function drawGrid(maxX, maxY) {
    let stepX = maxX / 10;
    let stepY = maxY / 10;

    for (let i = 0; i <= 10; i++) {
      let valX = i * stepX;
      let x = map(valX, 0, maxX, 0, width);
      
      stroke(200);
      line(x, 0, x, -height);
      
      noStroke();
      fill(120);
      text(valX.toFixed(1), x + 2, -4);
    }

    for (let i = 0; i <= 10; i++) {
      let valY = i * stepY;
      let y = map(valY, 0, maxY, 0, -height);
      
      stroke(200);
      line(0, y, width, y);
      
      noStroke();
      fill(120);
      text(valY.toFixed(1), 2, y - 4);
    }
  }

  function drawBars(maxX, maxY) {
    fill(0, 102, 204, 150); // Semi-transparent blue
    stroke(0, 51, 102);
    strokeWeight(1);

    for (let r of resultados) {
      let valX = r[selectedParameter];
      let valY = r.maximo_retorno_obtido;

      let x = map(valX, 0, maxX, 0, width);
      let y = map(valY, 0, maxY, 0, -height);

      rect(x - 10, 0, 20, y);
    }
  }
</script>

</html>
